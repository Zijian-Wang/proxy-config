  - 'DOMAIN-SUFFIX,chatgpt.com,🇺🇸 美国手动'
  - 'DOMAIN-SUFFIX,oaistatic.com,🇺🇸 美国手动'
  - 'DOMAIN-SUFFIX,oaiusercontent.com,🇺🇸 美国手动'
