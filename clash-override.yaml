# Clash Verge profile enhancement: rules.
# Add this as a rule enhancement on top of your existing subscription.
#
# Broker/account domains use the upstream US manual group for IP stability.
# OpenAI/ChatGPT also avoids Hong Kong by using the US manual group.

prepend:
