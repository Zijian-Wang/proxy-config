  - 'DOMAIN-KEYWORD,thinkorswim,🇺🇸 美国手动'
  - 'DOMAIN-SUFFIX,thinkorswim.com,🇺🇸 美国手动'
  - 'DOMAIN-SUFFIX,schwab.com,🇺🇸 美国手动'

  # OpenAI/ChatGPT: avoid Hong Kong.
