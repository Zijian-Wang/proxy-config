name: Update Shadowrocket Config

on:
  workflow_dispatch:
  schedule:
    # Mondays 09:20 Beijing time.
    - cron: "20 1 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build Shadowrocket config
        run: |
          python3 scripts/build_shadowrocket.py
          raw_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/shadowrocket.conf"
          python3 scripts/update_qr.py --url "$raw_url"

      - name: Commit changes
        run: |
          if [ -z "$(git status --short -- shadowrocket.conf assets/shadowrocket-qr.png)" ]; then
            echo "No upstream rule changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shadowrocket.conf assets/shadowrocket-qr.png
          git commit -m "Update Shadowrocket upstream rules"
          git push
