name: Update Shadowrocket Config

on:
  workflow_dispatch:
  schedule:
    # Mondays 09:20 Beijing time.
    - cron: "20 1 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build Shadowrocket config
        run: python3 scripts/build_shadowrocket.py

      - name: Commit changes
        run: |
          if git diff --quiet -- shadowrocket.conf; then
            echo "No upstream rule changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shadowrocket.conf
          git commit -m "Update Shadowrocket upstream rules"
          git push

